name: Sync EAIRA docs to Google Drive

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eaira-google-drive-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Publish EAIRA docs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-drive-sync.txt

      - name: Validate repository inputs
        shell: bash
        run: |
          test -d docs
          test -f scripts/google_drive_sync.py
          test -f requirements-drive-sync.txt

      - name: Validate required secrets
        shell: bash
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          test -n "${GOOGLE_CLIENT_ID}"
          test -n "${GOOGLE_CLIENT_SECRET}"
          test -n "${GOOGLE_REFRESH_TOKEN}"

      - name: Synchronize documentation
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          EAIRA_SYNC_SOURCE: docs
          EAIRA_DRIVE_ROOT_NAME: EAIRA_GITHUB_SYNC
        run: python scripts/google_drive_sync.py
